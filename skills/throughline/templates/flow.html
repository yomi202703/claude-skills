<!DOCTYPE html>
<!--
  throughline TEMPLATE — 作業の流れの対話ビュー(全幅1列・話者は色)。
  差し替えるのは下の <script> 内 THTAG と BEATS だけ。描画(CSS と beat())は触らない。

  THTAG = { T1:'筋の見出し', ... }            筋(スレッド)の名。
  BEATS = [ {th, who, k, t, decide?, rev?, ov?, now?}, ... ]
    th     : THTAG のキー(どの筋か)
    who    : 'me'(自分=あなた) | 'pair'(相棒) | 'out'(外部の相談役)   ← 色で区別
    k      : 'start'(きっかけ) | 'concl'(結論) | 'wall'(詰まり) | 'resp'(対応・転回)
    t      : 一行の本文(口語・内部語ゼロ)
    decide : true で意思決定の手(「決定」印)
    rev    : true で同じ筋の直前 beat を覆した手 / ov にその一行(誰が何を覆したか)
    now    : true で「いまここ」(最後に1つ)
  下は形を示す例。実データに丸ごと置き換える。
-->
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>この回の流れ — 誰がどの一手を打ったか</title>
<style>
  :root{--ink:#1a1d21;--muted:#6b727b;--line:#d8dde2;--bg:#fbfcfd;
    --me:#2d6cdf;--me-bg:#eaf2ff;--pair-bg:#f3f4f6;--out:#7a3ea8;
    --start:#2d6cdf;--concl:#2c7a4b;--wall:#c0392b;--resp:#c77d0a;--rev:#7a3ea8;}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
    color:var(--ink);background:var(--bg);line-height:1.5;font-size:15px}
  header.top{background:#1f2429;color:#fff;padding:16px 28px}
  header.top h1{margin:0;font-size:18px;font-weight:700}
  header.top .sub{margin-top:4px;color:#aeb6bf;font-size:13px}
  main{max-width:860px;margin:0 auto;padding:16px 24px 56px}
  .voices{display:flex;gap:8px;flex-wrap:wrap;margin:2px 0 12px}
  .vk{display:inline-flex;align-items:center;gap:5px;font-size:12px;border:1px solid var(--line);
    border-radius:14px;padding:2px 10px;background:#fff}
  .vk .dot{width:9px;height:9px;border-radius:50%}

  .beat{padding:5px 12px;border-left:3px solid var(--line);margin:2px 0}
  .beat.me{border-left-color:var(--me);background:var(--me-bg)}
  .beat.pair{border-left-color:#c7ccd2}
  .beat.out{border-left-color:var(--out)}
  .who{font-size:11px;font-weight:700;margin-bottom:1px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
  .beat.me .who{color:var(--me)} .beat.pair .who{color:var(--muted)} .beat.out .who{color:var(--out)}
  .kind{font-size:9.5px;font-weight:700;color:#fff;border-radius:8px;padding:1px 7px;letter-spacing:.03em}
  .k-start{background:var(--start)} .k-concl{background:var(--concl)}
  .k-wall{background:var(--wall)} .k-resp{background:var(--resp)}
  .decidetag{font-size:9.5px;font-weight:700;color:#fff;background:var(--concl);border-radius:8px;padding:1px 7px}
  .thref{font-size:10.5px;color:#9aa1a8;font-weight:400}
  .seq{font-size:10.5px;color:#aab1b8;font-variant-numeric:tabular-nums;font-weight:400}
  .revbadge{font-size:9.5px;font-weight:700;color:#fff;background:var(--rev);border-radius:8px;padding:1px 7px}
  .txt{font-size:14px}
  .overturn{font-size:12px;color:var(--rev);margin-top:3px;padding-left:9px;border-left:2px solid var(--rev)}
  .now{font-size:10.5px;font-weight:700;color:var(--me)}
  footer{max-width:860px;margin:0 auto;padding:12px 24px;color:var(--muted);font-size:12px;border-top:1px solid var(--line)}
  @media print{body{background:#fff}}
</style>
</head>
<body>
<header class="top">
  <h1>この回の流れ — 誰がどの一手を打ったか</h1>
  <div class="sub">話者は色で区別(私=青)。後で思い出す取っ掛かりは「自分が何を言ったか」だから。</div>
</header>
<main>
  <div class="voices">
    <span class="vk"><span class="dot" style="background:#2d6cdf"></span>私(あなた)</span>
    <span class="vk"><span class="dot" style="background:#6b727b"></span>相棒</span>
    <span class="vk"><span class="dot" style="background:#7a3ea8"></span>相談役(外部)</span>
  </div>
  <div id="view"></div>
</main>
<footer id="foot"></footer>

<script>
// ▼▼▼ ここだけ差し替える ▼▼▼
const THTAG = {
  T1:'何を作るか',
  T2:'どう見せるか',
};
const BEATS = [
  {th:'T1',who:'me',  k:'start', t:'「こういうものが要る」と私が言った。'},
  {th:'T1',who:'pair',k:'wall',  t:'最初の作りでは思っていた通りに動かなかった。'},
  {th:'T1',who:'pair',k:'resp',  rev:1, decide:1, ov:'最初の作りを捨てた', t:'作り直して、別のやり方に切り替えた。'},
  {th:'T2',who:'me',  k:'concl', decide:1, now:1, t:'「この見せ方でいく」と私が決めた。'},
];
// ▲▲▲ ここまで ▲▲▲

const KLABEL={start:'きっかけ',concl:'結論',wall:'詰まり',resp:'対応'};
function beat(b,i){
  const cls = b.who==='me' ? 'me' : (b.who==='out' ? 'out' : 'pair');
  const label = b.who==='me' ? '私(あなた)' : (b.who==='out' ? '相談役' : '相棒');
  return `<div class="beat ${cls}">
    <div class="who"><span class="seq">${String(i).padStart(2,'0')}</span>${label}
      <span class="kind k-${b.k}">${KLABEL[b.k]}</span>
      ${b.decide?'<span class="decidetag">決定</span>':''}
      <span class="thref">${THTAG[b.th]}</span>
      ${b.rev?'<span class="revbadge">⟲ 覆した</span>':''}${b.now?'<span class="now">● いまここ</span>':''}</div>
    <div class="txt">${b.t}</div>
    ${b.ov?`<div class="overturn">⟲ ${b.ov}</div>`:''}
  </div>`;
}
document.getElementById('view').innerHTML = BEATS.map((b,i)=>beat(b,i+1)).join('');
document.getElementById('foot').innerHTML =
  `色=話者(私=青/相棒=灰/相談役=紫)。決定タグ=意思決定。⟲=誰がどの手を覆したか。`;
</script>
</body>
</html>
